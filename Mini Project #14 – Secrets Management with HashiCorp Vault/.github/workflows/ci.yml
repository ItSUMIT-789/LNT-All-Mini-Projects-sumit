name: Flask CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  python-setup:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: |
          python --version

  run-tests:

    runs-on: ubuntu-latest

    needs: python-setup

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Reports Directory
        run: |
          mkdir -p reports

      - name: Execute Tests
        run: |
          pytest test_app.py \
          --html=reports/pytest-report.html \
          --self-contained-html

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/

      - name: Run Pylint
        run: |
          pylint app.py --output-format=text | tee reports/pylint-report.txt

      - name: Upload Pylint Report
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: reports/pylint-report.txt

  vault-secrets-demo:

    runs-on: ubuntu-latest

    needs: run-tests

    # Spin up a local Vault instance for demonstration purposes
    services:
      vault:
        image: hashicorp/vault:latest
        ports:
          - 8200:8200
        env:
          # In a real environment, this Vault token would be stored in GitHub Secrets
          # For this demo with a local ephemeral Vault, we use a test token
          VAULT_DEV_ROOT_TOKEN_ID: test_root_token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Vault Secrets
        run: |
          # Wait for Vault to be ready
          sleep 5
          export VAULT_ADDR='http://127.0.0.1:8200'
          export VAULT_TOKEN='test_root_token'
          # Enable KV v2 secrets engine
          vault secrets enable -path=secret kv-v2 || true
          # Create demo secrets
          vault kv put secret/devops db_password="supersecret_db_pass" api_key="abc123xyz"

      - name: Retrieve Secrets Securely
        env:
          VAULT_ADDR: 'http://127.0.0.1:8200'
          # Retrieves Vault token from GitHub Secrets (simulated here with a fallback for local testing)
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN || 'test_root_token' }}
        run: |
          # Retrieve the secret using Vault CLI (could also use HashiCorp Vault Action)
          SECRET_JSON=$(vault kv get -format=json secret/devops)
          DB_PASS=$(echo $SECRET_JSON | jq -r .data.data.db_password)
          API_KEY=$(echo $SECRET_JSON | jq -r .data.data.api_key)
          
          # SECURITY CONTROL: Mask the secret values before they are used so they do not appear in logs
          echo "::add-mask::$DB_PASS"
          echo "::add-mask::$API_KEY"
          
          # Demonstrate that secrets are masked in logs
          echo "Database Password: $DB_PASS"
          echo "API Key: $API_KEY"

  docker-build-push:

    runs-on: ubuntu-latest

    needs: vault-secrets-demo

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/flask-ci-demo:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/flask-ci-demo:${{ github.sha }}