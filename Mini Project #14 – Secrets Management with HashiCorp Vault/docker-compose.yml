version: "3.9"

services:

  # ---------------------------------------------------------------
  # HashiCorp Vault — runs in development mode (in-memory storage)
  # ---------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ---------------------------------------------------------------
  # One-shot init container — populates Vault with secrets
  # Secrets come from environment variables, NEVER hardcoded.
  # ---------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:latest
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./vault-init.sh:/vault-init.sh
    entrypoint: ["sh", "/vault-init.sh"]
    environment:
      VAULT_ADDR: "http://vault:8200"
      DB_PASSWORD: ${DB_PASSWORD}       # sourced from .env or shell
      API_KEY: ${API_KEY}               # sourced from .env or shell
    restart: "no"

  # ---------------------------------------------------------------
  # Flask application — retrieves secrets from Vault at runtime
  # ---------------------------------------------------------------
  sample-app:
    build: .
    container_name: sample-app
    ports:
      - "5000:5000"
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
